name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: clearschema/package-lock.json
      - run: npm ci
        working-directory: clearschema
      - run: npm run lint
        working-directory: clearschema
      - run: npm run build
        working-directory: clearschema
      - run: npm test -- --coverage
        working-directory: clearschema
